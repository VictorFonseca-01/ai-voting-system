# ============================================
# CONFIGURAÇÕES DO SERVIDOR
# ============================================
server.port=8080

# ============================================
# BANCO DE DADOS - H2 (Desenvolvimento)
# ============================================
spring.datasource.url=jdbc:h2:mem:aivoting;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================
# BANCO DE DADOS - PostgreSQL (Produção)
# Descomente e configure para usar PostgreSQL
# ============================================
# spring.datasource.url=jdbc:postgresql://localhost:5432/aivoting
# spring.datasource.driver-class-name=org.postgresql.Driver
# spring.datasource.username=seu_usuario
# spring.datasource.password=sua_senha

# ============================================
# BANCO DE DADOS - MySQL (Alternativa)
# ============================================
# spring.datasource.url=jdbc:mysql://localhost:3306/aivoting?useSSL=false&serverTimezone=UTC
# spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
# spring.datasource.username=seu_usuario
# spring.datasource.password=sua_senha

# ============================================
# JPA / HIBERNATE
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Para PostgreSQL: org.hibernate.dialect.PostgreSQLDialect
# Para MySQL: org.hibernate.dialect.MySQLDialect

# ============================================
# JWT
# ============================================
jwt.secret=minha-chave-secreta-super-segura-ai-voting-system-2024-muito-longa
jwt.expiration=86400000

# ============================================
# CORS
# ============================================
cors.allowed-origins=http://localhost:3000

# ============================================
# LOGS
# ============================================
logging.level.com.aivoting=DEBUG
