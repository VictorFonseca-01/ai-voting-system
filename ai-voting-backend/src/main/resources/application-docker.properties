# ============================================
# PERFIL DOCKER — usa PostgreSQL via Docker
# Ativado automaticamente pelo docker-compose
# ============================================

server.port=${PORT:8080}

# ─── PostgreSQL (suporta variáveis de ambiente do Railway/Cloud) ────────
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db:5432/${POSTGRES_DB:aivoting}}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:aivoting}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:aivoting123}}

# ─── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:minha-chave-secreta-super-segura-ai-voting-2024-docker}
jwt.expiration=86400000

# ─── CORS ─────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ─── LOG ──────────────────────────────────────────────────────────
logging.level.com.aivoting=INFO
