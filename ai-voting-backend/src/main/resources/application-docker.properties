# ============================================
# PERFIL DOCKER — usa PostgreSQL via Docker
# Ativado automaticamente pelo docker-compose
# ============================================

server.port=${PORT:8080}

# ─── PostgreSQL (suporta variáveis nativas do Railway) ─────────────────
spring.datasource.url=jdbc:postgresql://${PGHOST:postgres.railway.internal}:${PGPORT:5432}/${PGDATABASE:railway}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${PGUSER:postgres}
spring.datasource.password=${PGPASSWORD}

# ─── HikariCP (Performance e Conectividade) ──────────────────────────
spring.datasource.hikari.connection-timeout=5000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.validation-timeout=2000
spring.datasource.hikari.leak-detection-threshold=2000

# ─── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ─── JWT ──────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:AIVotingSystem2026SuperSecretKeyThatIsDefinitelyLongEnoughForHS256Algorithm}
jwt.expiration=86400000

# ─── CORS ─────────────────────────────────────────────────────────
cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ─── LOG ──────────────────────────────────────────────────────────
logging.level.com.aivoting=INFO
